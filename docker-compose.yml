services:
  backend:
    build: ./backend
    ports:
      - "8001:8000"
    volumes:
      - ./backend/uploads:/app/uploads
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,video,utility
    env_file:
      - ./backend/.env

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    env_file:
      - ./frontend/.env
    
    restart: unless-stopped
      